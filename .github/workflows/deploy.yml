name: Deploy to GitHub Pages

# Runs on every push to main, and can also be triggered manually from the
# Actions tab (handy for re-deploying without a new commit).
on:
  push:
    branches: [main]
  workflow_dispatch:

# The deploy job needs write access to Pages and an OIDC token to prove to
# GitHub's Pages service that this workflow run is who it says it is — the
# actions/deploy-pages action exchanges that token for a deployment,
# instead of the older approach of pushing built files to a gh-pages
# branch with a personal access token.
permissions:
  contents: read
  pages: write
  id-token: write

# If a second push lands while a deployment is still running, cancel the
# older one instead of letting two deployments race each other.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build the production site
        run: npm run build

      - name: Upload the build output as a Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy the artifact to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
